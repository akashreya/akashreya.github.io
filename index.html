<!DOCTYPE html>
<html lang="en" data-theme="crimson" data-mode="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/akash.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akash S K — Staff Engineer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@200;300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* crimson-dark fallback vars — applied before React mounts */
      :root {
        --bg: #15110d;
        --bg2: #1e1812;
        --surf: #221a14;
        --surf2: rgba(33, 26, 20, 0.86);
        --line: #3a2e22;
        --line2: #f0e6d4;
        --ink: #f0e6d4;
        --ink2: #bca890;
        --ink3: #7a6a55;
        --accent: #e14b3a;
        --accent2: #f56f54;
        --surf-blur: 0px;
        --surf-radius: 4px;
        --surf-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
        --surf-border: 1px solid var(--line);
        --pill-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
        --glow-a: transparent;
        --glow-b: transparent;
        --font-display: "Instrument Serif", Georgia, serif;
        --font-body: "Manrope", system-ui, sans-serif;
        --font-mono: "IBM Plex Mono", monospace;
      }

      /* Prevent FOUC - apply theme before JS loads */
      html {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-body);
      }
    </style>
  </head>
  <body>
    <script>
      // GitHub Pages SPA routing: restore path saved by 404.html
      var redirect = sessionStorage.getItem('spa-redirect');
      if (redirect) {
        sessionStorage.removeItem('spa-redirect');
        history.replaceState(null, '', redirect);
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
